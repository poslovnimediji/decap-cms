display_url: https://cmt-docs.pages.dev/
site_url: https://cmt-docs.pages.dev/

media_folder: docs/static
public_folder: /docs

media_library:
  name: bunny
  config:
    storage_zone_name: cmt-docs
    cdn_url_prefix: https://cmt-docs-cdn.b-cdn.net

slug:
  encoding: ascii
  clean_accents: true

editor:
  preview: false

aliases:
  - &TITLE {name: title, label: Title, widget: string}
  - &DESCRIPTION {name: description, label: Description, widget: text, required: false}
  - &WEIGHT {name: weight, label: Weight, widget: number, required: false}
  - &BODY {name: body, label: Body, widget: markdown, required: false}
  - &IMAGE_OBJECT {name: image, label: Image, widget: object, required: false, fields: [
      {name: src, label: Src, widget: image, required: false},
      {name: alt, label: Alt, widget: string, required: false}
    ]}
  - &BUTTON_FIELDS [
      {name: label, label: Label, widget: string, required: false},
      {name: href, label: Href, widget: string, required: false}
    ]
  - &PRODUCT_HERO { name: hero, label: Product hero, widget: object, required: false, i18n: true, fields: [
      {name: autoplayMs, label: Autoplay (ms), widget: number, required: false, i18n: true, value_type: int},
      {name: pauseOnHover, label: Pause on hover, widget: boolean, required: false, i18n: true, default: true},
      {name: slides,
        label: Slides,
        widget: list,
        required: false,
        i18n: true,
        summary: "{{fields.title}}",
        fields: [
          *IMAGE_OBJECT,
          {name: eyebrow, label: Eyebrow, widget: string, required: false, i18n: true},
          {name: title, label: Title, widget: string, required: false, i18n: true},
          {name: text, label: Text, widget: markdown, required: false, i18n: true},
          {name: primaryButton, label: Primary Button, widget: object, required: false, i18n: true, fields: *BUTTON_FIELDS},
          {name: secondaryButton, label: Secondary Button, widget: object, required: false, i18n: true, fields: *BUTTON_FIELDS},
          {name: banner,
            label: Banner,
            widget: object,
            required: false,
            i18n: true,
            fields: [
              {name: title, label: Title, widget: string, required: false, i18n: true},
              {name: text, label: Text, widget: text, required: false, i18n: true},
              {name: href, label: Href, widget: string, required: false, i18n: true},
          ]},
      ]}
    ]}

collections:
  - name: general
    label: General
    label_singular: General page
    folder: docs/content/general
    create: true
    slug: "{{slug}}"
    index_file:
      pattern: _index
      fields:
        - *TITLE
        - *DESCRIPTION
        - *BODY
    fields:
      - *TITLE
      - *WEIGHT
      - *BODY

  - name: components
    label: Components
    label_singular: Component page
    folder: docs/content/components
    create: true
    slug: "{{slug}}"
    index_file:
      pattern: _index
      fields:
        - *TITLE
        - *DESCRIPTION
        - *BODY
    fields:
      - *TITLE
      - *DESCRIPTION
      - {name: figmaId, label: Figma ID, widget: string, required: false}
      - {name: githubIssueId, label: GitHub Issue ID, widget: create-github-issue, required: false}
      - *WEIGHT
      - name: properties
        label: Properties
        label_singular: Property
        widget: list
        required: false
        fields:
          - {name: name, label: Property Name, widget: string}
          - {name: type, label: 'Type (e.g., Variant, Boolean)', widget: string, required: false}
          - {name: default, label: Default value, widget: string, required: false}
          - name: values
            label: Values
            label_singular: Value
            widget: list
            required: false
            fields:
              - {name: name, label: Value Name, widget: string}
              - {name: image, label: Image, widget: image, required: false}
      - name: scenarios
        label: Scenarios
        label_singular: Scenario
        widget: list
        required: false
        fields:
          - {name: role, label: Role (e.g., system, editor, user), widget: string}
          - {name: scenario, label: Scenario Name, widget: string}
          - *DESCRIPTION
      - *BODY

  - name: layouts
    label: Layouts
    label_singular: Layout page
    folder: docs/content/layouts
    create: true
    slug: "{{slug}}"
    index_file:
      pattern: _index
      fields:
        - *TITLE
        - *DESCRIPTION
        - *BODY
    fields:
      - *TITLE
      - *DESCRIPTION
      - {name: figmaId, label: Figma ID, widget: string, required: false}
      - {name: githubIssueId, label: GitHub Issue ID, widget: create-github-issue, required: false}
      - *WEIGHT
      - {name: image, label: Image, widget: image, required: false}
      - name: components
        label: Components
        label_singular: Component
        widget: list
        required: false
        fields:
          - {name: name, label: Component Name, widget: string}
          - {name: mode, label: 'Mode (e.g., global, fixed, module)', widget: string}
      - *BODY

  - name: pages-config
    label: Pages & Config
    files:
      - label: Home Page
        name: home
        file: docs/content/_index.md
        fields:
          - *TITLE
          - *DESCRIPTION
          - *BODY
      - label: Print Page
        name: print
        file: docs/content/print.md
        fields:
          - *TITLE
      - label: Config
        name: config
        file: content/docs.toml
        fields:
          - *TITLE
